name: skn28-backend

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: skn28-backend:dev
    container_name: skn28-backend-dev
    restart: unless-stopped
    ports:
      - target: 8000
        published: "${BACKEND_HOST_PORT:-8001}"
        host_ip: "${BACKEND_HOST_BIND:-127.0.0.1}"
        protocol: tcp
    environment:
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      BACKEND_OPENROUTER_API_KEY: "${BACKEND_OPENROUTER_API_KEY:-}"
      BACKEND_SERVICE_NAME: "${BACKEND_SERVICE_NAME:-SKN28 Backend}"
      BACKEND_SERVICE_VERSION: "${BACKEND_SERVICE_VERSION:-0.1.0}"
      BACKEND_API_HOST: "0.0.0.0"
      BACKEND_API_PORT: "8000"
      BACKEND_RELOAD: "false"
      BACKEND_CORS_ORIGINS: '${BACKEND_CORS_ORIGINS:-["http://localhost:8501","http://127.0.0.1:8501","http://localhost:5173","http://127.0.0.1:5173","http://localhost:3000","http://127.0.0.1:3000"]}'
      BACKEND_LANGCHAIN_PROJECT: "${BACKEND_LANGCHAIN_PROJECT:-}"
      BACKEND_OPENROUTER_MODEL: "${BACKEND_OPENROUTER_MODEL:-openai/gpt-oss-120b}"
      BACKEND_OPENROUTER_APP_TITLE: "${BACKEND_OPENROUTER_APP_TITLE:-SKN28 Backend Agent}"
      BACKEND_OPENROUTER_APP_URL: "${BACKEND_OPENROUTER_APP_URL:-https://openrouter.ai/openai/gpt-oss-120b}"
      BACKEND_OPENROUTER_BASE_URL: "${BACKEND_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
      BACKEND_OPENROUTER_PROVIDER_ORDER: '${BACKEND_OPENROUTER_PROVIDER_ORDER:-["cerebras/fp16"]}'
      BACKEND_OPENROUTER_ALLOW_FALLBACKS: "${BACKEND_OPENROUTER_ALLOW_FALLBACKS:-false}"
      BACKEND_OPENROUTER_REQUIRE_PARAMETERS: "${BACKEND_OPENROUTER_REQUIRE_PARAMETERS:-false}"
      BACKEND_LLM_TEMPERATURE: "${BACKEND_LLM_TEMPERATURE:-0.2}"
      BACKEND_LLM_TIMEOUT_MS: "${BACKEND_LLM_TIMEOUT_MS:-60000}"
      BACKEND_LLM_MAX_RETRIES: "${BACKEND_LLM_MAX_RETRIES:-2}"
      BACKEND_LLM_REASONING_EFFORT: "${BACKEND_LLM_REASONING_EFFORT:-}"
      BACKEND_RAG_MCP_URL: "${BACKEND_RAG_MCP_URL:-http://127.0.0.1:8010/mcp}"
      BACKEND_ENABLE_RAG_TOOLS: "${BACKEND_ENABLE_RAG_TOOLS:-true}"
      BACKEND_TOOL_TIMEOUT_MS: "${BACKEND_TOOL_TIMEOUT_MS:-30000}"
      BACKEND_LOG_LEVEL: "${BACKEND_LOG_LEVEL:-INFO}"
      BACKEND_LOG_LLM_CONTEXT: "${BACKEND_LOG_LLM_CONTEXT:-true}"
